<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#ffffff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Do-Do - Kid View</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="icon" href="assets/dodo-icon.png" type="image/png" />
  <script>
    (() => {
      try {
        const preference = localStorage.getItem("do-do-theme-v1") || "system";
        const useDark = preference === "dark"
          || (preference === "system" && window.matchMedia?.("(prefers-color-scheme: dark)").matches);
        document.documentElement.dataset.theme = useDark ? "dark" : "light";
      } catch {
        document.documentElement.dataset.theme = "light";
      }
    })();
  </script>
  <style>
    :root {
      --ink: #121212;
      --muted: #666666;
      --surface-page: #f9f9f9;
      --surface-card: #ffffff;
      --surface-input: #ffffff;
      --line: rgba(0,0,0,0.08);
      --accent: #171918;
      --accent-weak: #f3f3f3;
      --radius-sm: 8px;
      --radius-md: 16px;
      --radius-lg: 28px;
      --radius-full: 999px;
      --font: "Manrope", system-ui, sans-serif;
    }
    html[data-theme="dark"] {
      --ink: #f4f7f6;
      --muted: #aeb8b5;
      --surface-page: #171d1c;
      --surface-card: #202927;
      --surface-input: #27312f;
      --line: rgba(236,248,245,0.1);
      --accent: #65d6c6;
      --accent-weak: rgba(101,214,198,0.18);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      font-family: var(--font);
      background: var(--surface-page);
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
    }
    body { padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left); }

    /* ── Screens ── */
    .screen { display: none; min-height: 100vh; flex-direction: column; align-items: center; justify-content: center; padding: 24px 20px; }
    .screen.active { display: flex; }

    /* ── PIN screen ── */
    .pin-wrap { width: 100%; max-width: 340px; text-align: center; }
    .pin-logo { width: 52px; height: 52px; border-radius: 14px; margin: 0 auto 20px; }
    .pin-heading { font-size: 22px; font-weight: 800; margin-bottom: 6px; }
    .pin-sub { font-size: 14px; color: var(--muted); margin-bottom: 28px; }
    .pin-dots { display: flex; gap: 14px; justify-content: center; margin-bottom: 24px; }
    .pin-dot { width: 16px; height: 16px; border-radius: 50%; background: var(--line); border: 2px solid var(--line); transition: background .15s; }
    .pin-dot.filled { background: var(--accent); border-color: var(--accent); }
    .pin-input {
      position: absolute; opacity: 0; pointer-events: none; width: 1px; height: 1px;
    }
    .pin-keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .pin-key {
      background: var(--surface-card);
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      padding: 18px 0;
      font-size: 22px;
      font-weight: 700;
      font-family: var(--font);
      color: var(--ink);
      cursor: pointer;
      transition: background .1s, transform .08s;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .pin-key:active { transform: scale(0.94); background: var(--accent-weak); }
    .pin-key.pin-delete { font-size: 18px; font-weight: 500; color: var(--muted); }
    .pin-error { font-size: 13px; color: #ef4444; margin-top: 16px; min-height: 20px; }

    /* ── Dashboard ── */
    .dash { width: 100%; max-width: 480px; min-height: 100vh; padding: 20px 0 100px; display: flex; flex-direction: column; }
    .dash-header { padding: 16px 20px 12px; display: flex; align-items: center; gap: 12px; }
    .dash-avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--accent-weak); display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 800; color: var(--accent); flex-shrink: 0; }
    .dash-greeting { flex: 1; }
    .dash-greeting strong { display: block; font-size: 18px; font-weight: 800; }
    .dash-greeting span { font-size: 13px; color: var(--muted); }

    /* Note from parents */
    .dash-note { margin: 0 16px 16px; background: var(--accent-weak); border-radius: var(--radius-md); padding: 14px 16px; border-left: 3px solid var(--accent); }
    .dash-note-label { font-size: 11px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 4px; }
    .dash-note-text { font-size: 14px; color: var(--ink); line-height: 1.5; }

    /* Section */
    .dash-section { padding: 0 16px; margin-bottom: 20px; }
    .dash-section-title { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 10px; }

    /* Card items */
    .kid-card {
      background: var(--surface-card);
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      padding: 12px 14px;
      margin-bottom: 8px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }
    .kid-card-icon { width: 32px; height: 32px; border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; flex-shrink: 0; background: var(--accent-weak); }
    .kid-card-icon svg { width: 16px; height: 16px; stroke: var(--accent); fill: none; stroke-width: 1.8; }
    .kid-card-body { flex: 1; }
    .kid-card-title { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
    .kid-card-due { font-size: 12px; color: var(--muted); }
    .kid-card-badge { font-size: 10px; font-weight: 700; color: var(--accent); background: var(--accent-weak); border-radius: var(--radius-full); padding: 2px 7px; margin-left: auto; flex-shrink: 0; align-self: center; }
    .kid-card.done .kid-card-title { text-decoration: line-through; color: var(--muted); }
    .empty-state { text-align: center; padding: 28px 16px; color: var(--muted); font-size: 14px; }

    /* New card FAB */
    .fab {
      position: fixed;
      bottom: calc(24px + env(safe-area-inset-bottom));
      right: 20px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius-full);
      padding: 14px 22px;
      font-size: 15px;
      font-weight: 700;
      font-family: var(--font);
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(0,0,0,0.18);
      display: flex;
      align-items: center;
      gap: 8px;
      -webkit-tap-highlight-color: transparent;
      z-index: 100;
    }
    .fab svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2.2; flex-shrink: 0; }
    html[data-theme="dark"] .fab { color: #171918; }

    /* New card form screen */
    .form-wrap { width: 100%; max-width: 480px; }
    .form-header { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
    .form-back { background: none; border: none; cursor: pointer; padding: 4px; color: var(--ink); }
    .form-back svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 2; }
    .form-title { font-size: 20px; font-weight: 800; }

    .field { margin-bottom: 18px; }
    .field label { display: block; font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 6px; }
    .field input, .field textarea {
      width: 100%;
      padding: 12px 14px;
      background: var(--surface-card);
      border: 1.5px solid var(--line);
      border-radius: var(--radius-sm);
      font-size: 15px;
      font-family: var(--font);
      color: var(--ink);
      outline: none;
      transition: border-color .15s;
    }
    .field input:focus, .field textarea:focus { border-color: var(--accent); }
    .field textarea { min-height: 90px; resize: vertical; }

    .submit-btn {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius-md);
      font-size: 16px;
      font-weight: 700;
      font-family: var(--font);
      cursor: pointer;
      margin-top: 8px;
      transition: opacity .15s;
    }
    html[data-theme="dark"] .submit-btn { color: #171918; }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
      background: #1a1a1a; color: #fff; padding: 10px 18px; border-radius: var(--radius-full);
      font-size: 13px; font-weight: 600; opacity: 0; transition: transform .25s, opacity .25s;
      z-index: 999; pointer-events: none; white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .loading { display: flex; align-items: center; justify-content: center; min-height: 60vh; color: var(--muted); font-size: 14px; }
  </style>
</head>
<body>

<!-- PIN screen -->
<div class="screen" id="pinScreen">
  <div class="pin-wrap">
    <img class="pin-logo" src="assets/dodo-icon.png" alt="Do-Do" />
    <h1 class="pin-heading">Enter your PIN</h1>
    <p class="pin-sub">4 digits to see your board</p>
    <div class="pin-dots" id="pinDots">
      <div class="pin-dot" id="d0"></div>
      <div class="pin-dot" id="d1"></div>
      <div class="pin-dot" id="d2"></div>
      <div class="pin-dot" id="d3"></div>
    </div>
    <input class="pin-input" id="pinInput" type="password" inputmode="numeric" maxlength="4" autocomplete="off" />
    <div class="pin-keypad" id="pinKeypad">
      <button class="pin-key" data-digit="1">1</button>
      <button class="pin-key" data-digit="2">2</button>
      <button class="pin-key" data-digit="3">3</button>
      <button class="pin-key" data-digit="4">4</button>
      <button class="pin-key" data-digit="5">5</button>
      <button class="pin-key" data-digit="6">6</button>
      <button class="pin-key" data-digit="7">7</button>
      <button class="pin-key" data-digit="8">8</button>
      <button class="pin-key" data-digit="9">9</button>
      <button class="pin-key" style="visibility:hidden" aria-hidden="true"></button>
      <button class="pin-key" data-digit="0">0</button>
      <button class="pin-key pin-delete" id="pinDelete">&#x232B;</button>
    </div>
    <p class="pin-error" id="pinError"></p>
  </div>
</div>

<!-- Dashboard screen -->
<div class="screen" id="dashScreen">
  <div class="dash" id="dashContent">
    <div class="loading">Loading...</div>
  </div>
  <button class="fab" id="newCardFab">
    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg>
    I need something
  </button>
</div>

<!-- New card screen -->
<div class="screen" id="newCardScreen">
  <div class="form-wrap">
    <div class="form-header">
      <button class="form-back" id="formBack" aria-label="Back">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <span class="form-title">I need something</span>
    </div>
    <form id="newCardForm">
      <div class="field">
        <label for="cardTitle">What do you need?</label>
        <input type="text" id="cardTitle" placeholder="e.g. paper, scissors and pen" autocomplete="off" required maxlength="200" />
      </div>
      <div class="field">
        <label for="cardDue">When do you need it?</label>
        <input type="date" id="cardDue" />
      </div>
      <div class="field">
        <label for="cardDetails">Any extra details? (optional)</label>
        <textarea id="cardDetails" placeholder="e.g. for the art project on Friday" maxlength="1000"></textarea>
      </div>
      <button type="submit" class="submit-btn" id="cardSubmit">Send to parents</button>
    </form>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ─── Helpers ────────────────────────────────────────────────────────────────
  const $ = (id) => document.getElementById(id);
  const params = new URLSearchParams(location.search);
  const KID_TOKEN = params.get("token") || "";
  const SESSION_KEY = "kid-session-v1:" + KID_TOKEN;

  function showScreen(id) {
    document.querySelectorAll(".screen").forEach((s) => s.classList.remove("active"));
    $(id).classList.add("active");
  }

  function showToast(msg, duration = 2800) {
    const t = $("toast");
    t.textContent = msg;
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), duration);
  }

  function formatDate(iso) {
    if (!iso) return "";
    const d = new Date(iso);
    const today = new Date();
    const tomorrow = new Date(today); tomorrow.setDate(today.getDate() + 1);
    const dayNames = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
    const monthNames = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    if (d.toDateString() === today.toDateString()) return "Today";
    if (d.toDateString() === tomorrow.toDateString()) return "Tomorrow";
    const diffDays = Math.round((d - today) / 86400000);
    if (diffDays > 0 && diffDays < 7) return dayNames[d.getDay()];
    return `${dayNames[d.getDay()]} ${d.getDate()} ${monthNames[d.getMonth()]}`;
  }

  function taskIcon() {
    return `<svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>`;
  }

  function eventIcon() {
    return `<svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>`;
  }

  // ─── PIN flow ────────────────────────────────────────────────────────────────
  let pinValue = "";
  let pinBusy = false;

  function updatePinDots() {
    for (let i = 0; i < 4; i++) {
      $("d" + i).classList.toggle("filled", i < pinValue.length);
    }
  }

  function appendDigit(d) {
    if (pinValue.length >= 4 || pinBusy) return;
    pinValue += d;
    updatePinDots();
    $("pinError").textContent = "";
    if (pinValue.length === 4) submitPin();
  }

  function deleteDigit() {
    pinValue = pinValue.slice(0, -1);
    updatePinDots();
  }

  $("pinKeypad").addEventListener("click", (e) => {
    const key = e.target.closest(".pin-key");
    if (!key) return;
    if (key.id === "pinDelete") { deleteDigit(); return; }
    const digit = key.dataset.digit;
    if (digit !== undefined) appendDigit(digit);
  });

  async function submitPin() {
    if (!KID_TOKEN) { $("pinError").textContent = "Invalid link."; return; }
    pinBusy = true;
    try {
      const res = await fetch("/api/guest-view", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ type: "kid-auth", token: KID_TOKEN, pin: pinValue }),
      });
      const data = await res.json();
      if (data.ok && data.session) {
        try { localStorage.setItem(SESSION_KEY, data.session); } catch {}
        showDashboard(data.session);
      } else if (data.error === "wrong_pin") {
        $("pinError").textContent = data.attemptsLeft > 0
          ? `Wrong PIN. ${data.attemptsLeft} tr${data.attemptsLeft === 1 ? "y" : "ies"} left.`
          : "Too many wrong tries. Try again in 10 minutes.";
        pinValue = ""; updatePinDots();
      } else if (data.error === "locked") {
        $("pinError").textContent = "Too many wrong tries. Try again in 10 minutes.";
        pinValue = ""; updatePinDots();
      } else {
        $("pinError").textContent = "Something went wrong. Try again.";
        pinValue = ""; updatePinDots();
      }
    } catch {
      $("pinError").textContent = "Connection error. Check your internet.";
      pinValue = ""; updatePinDots();
    }
    pinBusy = false;
  }

  // ─── Dashboard ───────────────────────────────────────────────────────────────
  async function showDashboard(session) {
    showScreen("dashScreen");
    $("dashContent").innerHTML = `<div class="loading">Loading your board...</div>`;

    try {
      const res = await fetch(`/api/guest-view?type=kid&token=${encodeURIComponent(KID_TOKEN)}&session=${encodeURIComponent(session)}`);
      const data = await res.json();

      if (res.status === 401) {
        // Session invalid - clear and ask for PIN again
        try { localStorage.removeItem(SESSION_KEY); } catch {}
        showScreen("pinScreen");
        $("pinError").textContent = "Session expired. Please enter your PIN again.";
        return;
      }

      renderDashboard(data, session);
    } catch {
      $("dashContent").innerHTML = `<div class="loading">Could not load. Check your internet and try again.</div>`;
    }
  }

  function renderDashboard(data, session) {
    const name = data.childName || "Hi";
    const firstLetter = name.charAt(0).toUpperCase();
    const today = new Date();
    const dayNames = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
    const monthNames = ["January","February","March","April","May","June","July","August","September","October","November","December"];
    const dateStr = `${dayNames[today.getDay()]}, ${today.getDate()} ${monthNames[today.getMonth()]}`;

    // Split cards: upcoming (have due date) vs undated tasks
    const upcoming = (data.cards || []).filter((c) => c.dueAt && c.status !== "done");
    const undated = (data.cards || []).filter((c) => !c.dueAt && c.status !== "done");
    const done = (data.cards || []).filter((c) => c.status === "done").slice(0, 3);

    function renderCardItem(c) {
      const isDone = c.status === "done";
      const icon = (c.type === "event") ? eventIcon() : taskIcon();
      const dueLabel = c.dueAt ? formatDate(c.dueAt) : "";
      const badge = c.createdByKid ? `<span class="kid-card-badge">Mine</span>` : "";
      return `
        <div class="kid-card${isDone ? " done" : ""}">
          <div class="kid-card-icon">${icon}</div>
          <div class="kid-card-body">
            <div class="kid-card-title">${escHtml(c.title)}</div>
            ${dueLabel ? `<div class="kid-card-due">${dueLabel}</div>` : ""}
          </div>
          ${badge}
        </div>`;
    }

    const noteHtml = data.note ? `
      <div class="dash-note">
        <div class="dash-note-label">Note from parents</div>
        <div class="dash-note-text">${escHtml(data.note)}</div>
      </div>` : "";

    const upcomingHtml = upcoming.length
      ? upcoming.map(renderCardItem).join("")
      : `<div class="empty-state">Nothing due this week - enjoy! &#127881;</div>`;

    const undatedHtml = undated.length
      ? `<div class="dash-section"><div class="dash-section-title">To do</div>${undated.map(renderCardItem).join("")}</div>`
      : "";

    const doneHtml = done.length
      ? `<div class="dash-section"><div class="dash-section-title">Done</div>${done.map(renderCardItem).join("")}</div>`
      : "";

    $("dashContent").innerHTML = `
      <div class="dash-header">
        <div class="dash-avatar">${firstLetter}</div>
        <div class="dash-greeting">
          <strong>Hi ${escHtml(name)}!</strong>
          <span>${dateStr}</span>
        </div>
      </div>
      ${noteHtml}
      <div class="dash-section">
        <div class="dash-section-title">Coming up</div>
        ${upcomingHtml}
      </div>
      ${undatedHtml}
      ${doneHtml}
    `;

    // Wire new card button with session
    $("newCardFab").onclick = () => {
      window._kidSession = session;
      openNewCardForm();
    };
  }

  function escHtml(str) {
    return String(str || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  // ─── New card form ────────────────────────────────────────────────────────────
  function openNewCardForm() {
    showScreen("newCardScreen");
    $("cardTitle").focus();
    // Set min date to today
    const today = new Date().toISOString().split("T")[0];
    $("cardDue").min = today;
  }

  $("formBack").onclick = () => showScreen("dashScreen");

  $("newCardForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const btn = $("cardSubmit");
    const session = window._kidSession;
    if (!session) { showToast("Session error - reload the page"); return; }

    btn.disabled = true;
    btn.textContent = "Sending...";

    try {
      const res = await fetch("/api/guest-view", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          type: "kid-card",
          token: KID_TOKEN,
          session,
          title: $("cardTitle").value.trim(),
          due: $("cardDue").value || null,
          details: $("cardDetails").value.trim() || null,
        }),
      });
      const data = await res.json();
      if (data.ok) {
        showScreen("dashScreen");
        showToast("Sent to your parents! &#10003;");
        // Refresh dashboard
        showDashboard(session);
        // Reset form
        $("newCardForm").reset();
      } else {
        showToast("Could not send. Try again.");
      }
    } catch {
      showToast("Connection error. Try again.");
    }

    btn.disabled = false;
    btn.textContent = "Send to parents";
  });

  // ─── Startup ─────────────────────────────────────────────────────────────────
  function init() {
    if (!KID_TOKEN) {
      showScreen("pinScreen");
      $("pinError").textContent = "Invalid link. Ask a parent for the correct link.";
      return;
    }

    // Check for saved session
    let savedSession = null;
    try { savedSession = localStorage.getItem(SESSION_KEY); } catch {}

    if (savedSession) {
      showDashboard(savedSession);
    } else {
      showScreen("pinScreen");
    }
  }

  init();
</script>
</body>
</html>
