<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Do-Do - Mediator Dashboard</title>
  <style>
    :root {
      --ink: #111827;
      --muted: #6b7280;
      --surface: #ffffff;
      --surface-alt: #f9fafb;
      --line: #e5e7eb;
      --accent: #7c3aed;
      --accent-light: #ede9fe;
      --success: #10b981;
      --success-light: #d1fae5;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --ink: #f9fafb;
        --muted: #9ca3af;
        --surface: #1f2937;
        --surface-alt: #111827;
        --line: #374151;
        --accent: #a78bfa;
        --accent-light: #2e1065;
        --success-light: #064e3b;
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--surface-alt);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 32px;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }
    .logo-mark {
      width: 36px; height: 36px;
      background: var(--accent);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      color: white;
      font-weight: 700;
      font-size: 16px;
    }
    .logo-name { font-weight: 700; font-size: 18px; }
    h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .subtitle {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 32px;
    }
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
      margin-bottom: 28px;
    }
    .stat {
      background: var(--surface-alt);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 16px 12px;
      text-align: center;
    }
    .stat-value {
      font-size: 28px;
      font-weight: 700;
      color: var(--accent);
      line-height: 1;
      margin-bottom: 6px;
    }
    .stat-label {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      line-height: 1.3;
    }
    .active-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--success-light);
      color: var(--success);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 24px;
    }
    .active-dot {
      width: 8px; height: 8px;
      background: var(--success);
      border-radius: 50%;
    }
    .footer-note {
      font-size: 12px;
      color: var(--muted);
      border-top: 1px solid var(--line);
      padding-top: 16px;
      line-height: 1.5;
    }
    .footer-note a { color: var(--accent); text-decoration: none; }
    .error-state {
      text-align: center;
      padding: 24px 0;
    }
    .error-state h2 { font-size: 18px; margin-bottom: 8px; }
    .error-state p { color: var(--muted); font-size: 14px; }
    .loading { text-align: center; color: var(--muted); padding: 32px 0; font-size: 14px; }
    .spinner {
      display: inline-block;
      width: 20px; height: 20px;
      border: 2px solid var(--line);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-mark">D</div>
      <span class="logo-name">Do-Do</span>
    </div>
    <div id="content">
      <div class="loading"><span class="spinner"></span>Loading your dashboard...</div>
    </div>
  </div>
  <script>
    (async () => {
      // Extract code from URL: /mediator/abc123 or ?code=abc123
      const pathMatch = window.location.pathname.match(/\/mediator\/([^/?#]+)/);
      const code = pathMatch?.[1] || new URLSearchParams(window.location.search).get("code") || "";

      const el = document.getElementById("content");

      if (!code) {
        el.innerHTML = `<div class="error-state"><h2>No dashboard found</h2><p>This link appears to be incomplete. Ask the family you referred for a new link.</p></div>`;
        return;
      }

      try {
        const res = await fetch(`/api/guest-view?type=mediator&code=${encodeURIComponent(code)}`);
        const data = await res.json();

        if (!res.ok || data.error) {
          el.innerHTML = `<div class="error-state"><h2>Dashboard not found</h2><p>This mediator code isn't recognised. Check the link or ask Do-Do for a new one.</p></div>`;
          return;
        }

        const { referred, bothActive, avgDays } = data;

        if (referred === 0) {
          el.innerHTML = `
            <h1>Mediator Dashboard</h1>
            <p class="subtitle">No families referred yet via this link.</p>
            <p style="font-size:14px;color:var(--muted);">When families sign up through your referral link, their activity will appear here.</p>
          `;
          return;
        }

        const activePercent = referred > 0 ? Math.round((bothActive / referred) * 100) : 0;

        el.innerHTML = `
          <h1>Your Referral Stats</h1>
          <p class="subtitle">Families who joined Do-Do through your recommendation</p>
          <div class="stats-grid">
            <div class="stat">
              <div class="stat-value">${referred}</div>
              <div class="stat-label">Families referred</div>
            </div>
            <div class="stat">
              <div class="stat-value">${bothActive}</div>
              <div class="stat-label">Both parents active</div>
            </div>
            <div class="stat">
              <div class="stat-value">${avgDays}</div>
              <div class="stat-label">Avg. days active</div>
            </div>
          </div>
          ${bothActive > 0 ? `<div class="active-pill"><span class="active-dot"></span>${bothActive} of ${referred} families have both parents coordinating actively</div>` : ""}
          <p class="footer-note">
            Stats show families referred via your unique link. "Both active" means both partners created or updated items in the last 14 days. No personal data is shown - aggregate only.<br><br>
            Questions? <a href="mailto:hello@do-do.app">hello@do-do.app</a>
          </p>
        `;
      } catch (err) {
        el.innerHTML = `<div class="error-state"><h2>Could not load</h2><p>Try refreshing. If this keeps happening, contact us at hello@do-do.app</p></div>`;
      }
    })();
  </script>
</body>
</html>
